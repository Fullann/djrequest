<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DJ Queue - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap");
      * {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#0d0d0d] text-white min-h-screen">
    <!-- Header -->
    <div
      class="border-b border-white/10 bg-[#0d0d0d]/90 backdrop-blur"
    >
      <div class="max-w-6xl mx-auto px-4 sm:px-6 py-5 flex flex-col gap-4 sm:flex-row sm:justify-between sm:items-center">
        <div>
          <h1 class="text-3xl font-extrabold">🎧 Dashboard DJ</h1>
          <p id="djName" class="text-gray-400 mt-1">Bienvenue</p>
        </div>
        <div class="flex flex-wrap gap-2 sm:gap-3">
          <button
            id="btnHistory"
            class="border border-white/20 bg-white/5 hover:bg-white/10 text-gray-100 font-semibold py-2 px-5 rounded-xl transition"
          >
            📚 Historique
          </button>
          <button
            id="btnCreateEvent"
            class="bg-violet-600 hover:bg-violet-500 text-white font-semibold py-2 px-5 rounded-xl transition"
          >
            ➕ Nouvelle soirée
          </button>
          <button
            id="btnLogout"
            class="border border-red-400/50 bg-red-500/20 hover:bg-red-500/30 text-red-200 font-semibold py-2 px-5 rounded-xl transition"
          >
            Déconnexion
          </button>
        </div>
      </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
      <!-- Stats globales -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white/5 border border-white/10 rounded-2xl p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-400 text-sm">Soirées totales</p>
              <p id="totalEvents" class="text-3xl font-extrabold text-violet-400">
                0
              </p>
            </div>
            <div class="text-4xl">🎉</div>
          </div>
        </div>

        <div class="bg-white/5 border border-white/10 rounded-2xl p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-400 text-sm">Chansons jouées</p>
              <p id="totalSongs" class="text-3xl font-extrabold text-green-400">0</p>
            </div>
            <div class="text-4xl">🎵</div>
          </div>
        </div>

        <div class="bg-white/5 border border-white/10 rounded-2xl p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-400 text-sm">Votes moyens</p>
              <p id="avgVotes" class="text-3xl font-extrabold text-cyan-400">0</p>
            </div>
            <div class="text-4xl">👍</div>
          </div>
        </div>

        <div class="bg-white/5 border border-white/10 rounded-2xl p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-400 text-sm">Taux acceptation</p>
              <p id="acceptRate" class="text-3xl font-extrabold text-pink-400">
                0%
              </p>
            </div>
            <div class="text-4xl">✅</div>
          </div>
        </div>
      </div>

      <!-- Soirées actives -->
      <div class="bg-white/5 border border-white/10 rounded-2xl mb-6">
        <div class="p-6 border-b border-white/10">
          <h2 class="text-2xl font-bold text-white">🔴 Soirées actives</h2>
        </div>
        <div id="activeEventsList" class="p-6">
          <p class="text-gray-400 text-center py-8">Chargement...</p>
        </div>
      </div>

      <!-- Top chansons -->
      <div class="bg-white/5 border border-white/10 rounded-2xl">
        <div class="p-6 border-b border-white/10">
          <h2 class="text-2xl font-bold text-white">
            🏆 Top chansons de toutes mes soirées
          </h2>
        </div>
        <div id="topSongs" class="p-6">
          <p class="text-gray-400 text-center py-8">Chargement...</p>
        </div>
      </div>
    </div>

    <!-- Modal création soirée -->
    <div
      id="createEventModal"
      class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4"
    >
      <div class="bg-[#151515] border border-white/10 rounded-2xl shadow-2xl max-w-md w-full p-6">
        <h2 class="text-2xl font-bold text-white mb-4">
          ➕ Créer une nouvelle soirée
        </h2>

        <form id="createEventForm">
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-300 mb-2"
              >Nom de la soirée</label
            >
            <input
              type="text"
              id="eventName"
              required
              class="w-full px-4 py-3 border border-white/20 bg-black/30 text-white rounded-xl focus:ring-2 focus:ring-violet-500 outline-none"
              placeholder="Soirée du 10 février"
            />
          </div>

          <div class="flex gap-3">
            <button
              type="button"
              id="btnCancelModal"
              class="flex-1 border border-white/20 bg-white/5 hover:bg-white/10 text-gray-200 font-semibold py-3 rounded-xl transition"
            >
              Annuler
            </button>
            <button
              type="submit"
              class="flex-1 bg-violet-600 hover:bg-violet-500 text-white font-semibold py-3 rounded-xl transition"
            >
              Créer
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="/js/csrf.js"></script>
    <script>
      let djData = null;

      // ========== Event Listeners ==========

      document.getElementById("btnHistory").addEventListener("click", () => {
        window.location.href = "/history";
      });

      document
        .getElementById("btnCreateEvent")
        .addEventListener("click", openCreateEventModal);
      document.getElementById("btnLogout").addEventListener("click", logout);
      document
        .getElementById("btnCancelModal")
        .addEventListener("click", closeModal);

      document
        .getElementById("createEventModal")
        .addEventListener("click", (e) => {
          if (e.target.id === "createEventModal") closeModal();
        });

      document
        .getElementById("createEventForm")
        .addEventListener("submit", handleCreateEvent);

      // Délégation d'événements
      document
        .getElementById("activeEventsList")
        .addEventListener("click", async (e) => {
          const button = e.target.closest("button");
          if (!button) return;

          const action = button.dataset.action;
          const eventId = button.dataset.eventId;
          const eventName = button.dataset.eventName;

          if (action === "show-qr") {
            showQRCode(eventId, eventName);
          } else if (action === "open-dj") {
            goToDJ(eventId);
          } else if (action === "end-event") {
            await endEvent(eventId, eventName);
          }
        });

      // ========== Fonctions ==========

      async function loadDashboard() {
        try {
          const response = await fetch("/api/dj/dashboard");

          if (response.status === 401) {
            window.location.href = "/login";
            return;
          }

          if (!response.ok) throw new Error("Erreur chargement dashboard");

          djData = await response.json();

          document.getElementById("djName").textContent =
            `Bienvenue, ${djData.dj.name}`;

          // Stats globales
          document.getElementById("totalEvents").textContent =
            parseInt(djData.stats.totalEvents) || 0;
          document.getElementById("totalSongs").textContent =
            parseInt(djData.stats.totalSongs) || 0;

          const avgVotes = parseFloat(djData.stats.avgVotes) || 0;
          document.getElementById("avgVotes").textContent = avgVotes.toFixed(1);

          document.getElementById("acceptRate").textContent =
            djData.stats.acceptRate || "0%";

          // Séparer les événements actifs et terminés
          const activeEvents = (djData.events || []).filter((e) => !e.ended_at);
          renderActiveEvents(activeEvents);

          renderTopSongs(djData.topSongs || []);
        } catch (error) {
          console.error("Erreur:", error);
          showErrorPage(error.message);
        }
      }

      function renderActiveEvents(events) {
        const container = document.getElementById("activeEventsList");

        if (!events || events.length === 0) {
          container.innerHTML =
            '<p class="text-gray-400 text-center py-8">Aucune soirée active</p>';
          return;
        }

        container.innerHTML = events
          .map((event) => {
            const date = new Date(event.created_at).toLocaleDateString(
              "fr-FR",
              {
                day: "numeric",
                month: "long",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit",
              },
            );

            const escapedName = event.name.replace(/'/g, "\\'");
            const acceptedCount = event.accepted_count || 0;

            return `
          <div class="border-b border-white/10 last:border-b-0 py-4 hover:bg-white/[0.03] transition rounded-xl">
            <div class="flex flex-col gap-4 lg:flex-row lg:justify-between lg:items-start">
              <div class="flex-1">
                <div class="flex items-center gap-2">
                  <h3 class="font-bold text-lg text-white">${event.name}</h3>
                  <span class="bg-green-500/20 text-green-300 text-xs font-semibold px-2 py-1 rounded-full border border-green-400/30">ACTIVE</span>
                </div>
                <p class="text-sm text-gray-400">${date}</p>
                <div class="flex gap-4 mt-2 text-sm">
                  <span class="text-green-300">✓ ${event.played_songs || 0} jouées</span>
                  <span class="text-yellow-300">⏳ ${acceptedCount} en attente</span>
                  <span class="text-red-300">✗ ${event.rejected_songs || 0} refusées</span>
                  <span class="text-gray-300">📊 ${event.total_songs || 0} total</span>
                </div>
              </div>
              <div class="flex flex-wrap gap-2">
                <button 
                  data-action="show-qr"
                  data-event-id="${event.id}"
                  data-event-name="${escapedName}"
                  class="bg-cyan-600/90 hover:bg-cyan-500 text-white text-sm font-semibold py-2 px-4 rounded-xl transition"
                >
                  📱 QR Code
                </button>
                <button 
                  data-action="open-dj"
                  data-event-id="${event.id}"
                  class="bg-violet-600 hover:bg-violet-500 text-white text-sm font-semibold py-2 px-4 rounded-xl transition"
                >
                  🎧 Ouvrir
                </button>
                <button 
                  data-action="end-event"
                  data-event-id="${event.id}"
                  data-event-name="${escapedName}"
                  class="border border-red-400/50 bg-red-500/20 hover:bg-red-500/30 text-red-200 text-sm font-semibold py-2 px-4 rounded-xl transition"
                >
                  🏁 Terminer
                </button>
              </div>
            </div>
          </div>
        `;
          })
          .join("");
      }

      async function endEvent(eventId, eventName) {
        const confirmed = confirm(
          `🏁 Terminer "${eventName}" ?\n\n` +
            `Cela va :\n` +
            `- Archiver la soirée\n` +
            `- Sauvegarder les statistiques\n` +
            `- Empêcher de nouvelles demandes\n\n` +
            `Vous pourrez consulter les stats dans l'historique.`,
        );

        if (!confirmed) return;

        try {
          const response = await fetch(`/api/events/${eventId}/end`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            cache: "no-cache", // ← Ajouter cette ligne
          });

          const data = await response.json();

          if (data.success) {
            alert(
              `✅ Soirée terminée avec succès !\n\n📊 Stats:\n- ${data.stats.played_count || 0} chansons jouées\n- ${data.stats.rejected_count || 0} refusées\n- ${data.stats.total_requests || 0} demandes au total`,
            );

            // Forcer le rechargement complet de la page
            window.location.reload();
          } else {
            alert("Erreur: " + (data.error || "Erreur inconnue"));
          }
        } catch (error) {
          console.error("Erreur fin événement:", error);
          alert("Erreur lors de la fin de la soirée");
        }
      }

      function renderTopSongs(songs) {
        const container = document.getElementById("topSongs");

        if (!songs || songs.length === 0) {
          container.innerHTML =
            '<p class="text-gray-400 text-center py-8">Aucune chanson jouée</p>';
          return;
        }

        container.innerHTML = `
        <div class="overflow-x-auto">
        <table class="w-full min-w-[640px]">
          <thead class="bg-white/[0.03]">
            <tr>
              <th class="text-left p-3 font-semibold text-gray-300">#</th>
              <th class="text-left p-3 font-semibold text-gray-300">Chanson</th>
              <th class="text-left p-3 font-semibold text-gray-300">Artiste</th>
              <th class="text-center p-3 font-semibold text-gray-300">Fois jouée</th>
              <th class="text-center p-3 font-semibold text-gray-300">Votes moy.</th>
            </tr>
          </thead>
          <tbody>
            ${songs
              .slice(0, 10)
              .map((song, index) => {
                const avgUpvotes = parseFloat(song.avg_upvotes) || 0;
                return `
                <tr class="border-b border-white/10 hover:bg-white/[0.03]">
                  <td class="p-3 font-bold text-violet-400">${index + 1}</td>
                  <td class="p-3 font-semibold text-white">${song.song_name}</td>
                  <td class="p-3 text-gray-300">${song.artist}</td>
                  <td class="p-3 text-center">${song.play_count}</td>
                  <td class="p-3 text-center text-green-300 font-semibold">${avgUpvotes.toFixed(1)}</td>
                </tr>
              `;
              })
              .join("")}
          </tbody>
        </table>
        </div>
      `;
      }

      function openCreateEventModal() {
        document.getElementById("createEventModal").classList.remove("hidden");
        document.getElementById("eventName").focus();
      }

      function closeModal() {
        document.getElementById("createEventModal").classList.add("hidden");
        document.getElementById("eventName").value = "";
      }

      async function handleCreateEvent(e) {
        e.preventDefault();

        const name = document.getElementById("eventName").value;

        try {
          const response = await fetch("/api/events", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name }),
          });

          const data = await response.json();

          if (response.ok) {
            closeModal();
            showQRCode(data.eventId, name);
          } else {
            alert(data.error || "Erreur création soirée");
          }
        } catch (error) {
          console.error("Erreur:", error);
          alert("Erreur création soirée");
        }
      }

      function showQRCode(eventId, eventName) {
        window.location.href = `/event/${eventId}/qr`;
      }

      function goToDJ(eventId) {
        window.location.href = `/dj/${eventId}`;
      }

      async function logout() {
        try {
          await fetch("/api/auth/logout", { method: "POST" });
          window.location.href = "/login";
        } catch (error) {
          console.error("Erreur logout:", error);
          window.location.href = "/login";
        }
      }

      function showErrorPage(message) {
        document.body.innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-[#0d0d0d] text-white p-4">
          <div class="bg-white/5 border border-white/10 p-8 rounded-2xl shadow-lg max-w-md">
            <h2 class="text-2xl font-bold text-red-300 mb-4">Erreur</h2>
            <p class="text-gray-200 mb-4">Impossible de charger le dashboard</p>
            <p class="text-sm text-gray-400 mb-4">${message}</p>
            <button 
              onclick="window.location.href='/login'"
              class="bg-violet-600 text-white px-6 py-2 rounded-xl hover:bg-violet-500"
            >
              Retour à la connexion
            </button>
          </div>
        </div>
      `;
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          const modal = document.getElementById("createEventModal");
          if (!modal.classList.contains("hidden")) {
            closeModal();
          }
        }
      });

      loadDashboard();
    </script>
  </body>
</html>
