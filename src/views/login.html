<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ Queue — Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css" />
  <script src="/js/theme.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background:var(--bg-base)">

  <div class="w-full max-w-sm fade-in">

    <!-- Brand -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-5" style="background:var(--accent-dim);border:1px solid rgba(124,92,252,0.3)">
        <svg class="w-7 h-7" style="color:var(--accent)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
          <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
          <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold tracking-tight" style="color:var(--text-primary)">DJ Queue</h1>
      <p class="text-sm mt-2" style="color:var(--text-secondary)">Gérez vos soirées musicales</p>
    </div>

    <!-- Card -->
    <div class="card p-8">

      <!-- Message d'erreur -->
      <div id="errorMessage" class="hidden rounded-xl p-4 mb-6" style="background:var(--red-dim);border:1px solid rgba(239,68,68,0.2)">
        <p class="text-sm" id="errorText" style="color:#f87171"></p>
      </div>

      <!-- Bouton Spotify -->
      <a href="/api/auth/spotify/login"
         class="flex items-center justify-center gap-3 w-full rounded-xl font-semibold text-white transition-all duration-200"
         style="background:#1DB954;padding:14px 20px;font-size:0.9375rem;letter-spacing:0.01em;"
         onmouseover="this.style.background='#1aa34a';this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 16px rgba(29,185,84,0.4)'"
         onmouseout="this.style.background='#1DB954';this.style.transform='none';this.style.boxShadow='none'">
        <!-- Icône Spotify -->
        <svg viewBox="0 0 24 24" class="w-5 h-5 flex-shrink-0" fill="currentColor">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        Se connecter avec Spotify
      </a>

      <p class="text-center text-xs mt-6 leading-relaxed" style="color:var(--text-muted)">
        Votre compte Spotify est utilisé uniquement pour vous identifier.<br>
        Aucune donnée n'est partagée sans votre consentement.
      </p>
    </div>

    <!-- Footer info -->
    <p class="text-center text-xs mt-6" style="color:var(--text-muted)">
      Première connexion ? Un compte est créé automatiquement.
    </p>
  </div>

  <!-- Fixed theme toggle -->
  <button data-theme-toggle class="fixed bottom-4 right-4 btn btn-ghost btn-icon" title="Passer en mode clair" style="background:var(--bg-surface);border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.15)">
    <svg class="w-4 h-4 icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="w-4 h-4 icon-moon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <script>
    // Afficher l'erreur si présente dans l'URL
    const params = new URLSearchParams(window.location.search);
    const err = params.get("error");
    if (err) {
      const msgs = {
        spotify_denied:  "Connexion Spotify annulée.",
        invalid_state:   "Erreur de sécurité. Veuillez réessayer.",
        missing_params:  "Paramètres manquants. Veuillez réessayer.",
        spotify_error:   "Erreur lors de la connexion Spotify. Vérifiez vos paramètres.",
      };
      const el = document.getElementById("errorMessage");
      document.getElementById("errorText").textContent = msgs[err] || "Erreur inconnue.";
      el.classList.remove("hidden");
    }
  </script>
</body>
</html>
