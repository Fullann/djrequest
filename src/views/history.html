<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historique - DJ Queue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap");
      * {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#0d0d0d] text-white min-h-screen">
    <!-- Header -->
    <div
      class="border-b border-white/10 bg-[#0d0d0d]/90 backdrop-blur"
    >
      <div class="max-w-6xl mx-auto px-4 sm:px-6 py-5 flex flex-col gap-4 sm:flex-row sm:justify-between sm:items-center">
        <div>
          <h1 class="text-3xl font-extrabold">📚 Historique des soirées</h1>
          <p id="djName" class="text-gray-400 mt-1">Chargement...</p>
        </div>
        <div class="flex gap-3">
          <button
            id="btnBackToDashboard"
            class="border border-white/20 bg-white/5 hover:bg-white/10 text-gray-100 font-semibold py-2 px-5 rounded-xl transition"
          >
            ← Dashboard
          </button>
        </div>
      </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
      <!-- Stats historique -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-white/5 border border-white/10 rounded-2xl p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-400 text-sm">Soirées terminées</p>
              <p
                id="totalEndedEvents"
                class="text-3xl font-extrabold text-violet-400"
              >
                0
              </p>
            </div>
            <div class="text-4xl">🏁</div>
          </div>
        </div>

        <div class="bg-white/5 border border-white/10 rounded-2xl p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-400 text-sm">Durée totale</p>
              <p id="totalDuration" class="text-3xl font-extrabold text-cyan-400">
                0h
              </p>
            </div>
            <div class="text-4xl">⏱️</div>
          </div>
        </div>

        <div class="bg-white/5 border border-white/10 rounded-2xl p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-400 text-sm">Chansons totales</p>
              <p
                id="totalSongsPlayed"
                class="text-3xl font-extrabold text-green-400"
              >
                0
              </p>
            </div>
            <div class="text-4xl">🎵</div>
          </div>
        </div>
      </div>

      <!-- Liste des soirées terminées -->
      <div class="bg-white/5 border border-white/10 rounded-2xl">
        <div class="p-6 border-b border-white/10">
          <h2 class="text-2xl font-bold text-white">🗂️ Soirées passées</h2>
        </div>
        <div id="endedEventsList" class="p-6">
          <p class="text-gray-400 text-center py-8">Chargement...</p>
        </div>
      </div>
    </div>

    <script src="/js/csrf.js"></script>
    <script>
      document
        .getElementById("btnBackToDashboard")
        .addEventListener("click", () => {
          window.location.href = "/dashboard";
        });

      async function loadHistory() {
        try {
          const response = await fetch("/api/dj/history");

          if (response.status === 401) {
            window.location.href = "/login";
            return;
          }

          if (!response.ok) throw new Error("Erreur chargement historique");

          const data = await response.json();

          document.getElementById("djName").textContent = `${data.dj.name}`;

          // Stats
          document.getElementById("totalEndedEvents").textContent =
            data.stats.totalEnded || 0;
          document.getElementById("totalDuration").textContent = formatDuration(
            data.stats.totalDurationMinutes || 0,
          );
          document.getElementById("totalSongsPlayed").textContent =
            data.stats.totalSongsPlayed || 0;

          renderEndedEvents(data.events || []);
        } catch (error) {
          console.error("Erreur:", error);
          alert("Erreur lors du chargement de l'historique");
        }
      }

      function formatDuration(minutes) {
        if (minutes < 60) return `${minutes}m`;
        const hours = Math.floor(minutes / 60);
        const mins = minutes % 60;
        return mins > 0 ? `${hours}h${mins}` : `${hours}h`;
      }

      function renderEndedEvents(events) {
        const container = document.getElementById("endedEventsList");

        if (!events || events.length === 0) {
          container.innerHTML =
            '<p class="text-gray-400 text-center py-8">Aucune soirée terminée</p>';
          return;
        }

        container.innerHTML = events
          .map((event) => {
            const startDate = new Date(event.created_at);
            const endDate = new Date(event.ended_at);

            const dateStr = startDate.toLocaleDateString("fr-FR", {
              day: "numeric",
              month: "long",
              year: "numeric",
            });

            const duration = Math.floor((endDate - startDate) / (1000 * 60)); // minutes

            return `
          <div class="border-b border-white/10 last:border-b-0 py-4 hover:bg-white/[0.03] transition cursor-pointer rounded-xl" onclick="viewEventDetails('${event.id}')">
            <div class="flex flex-col gap-4 lg:flex-row lg:justify-between lg:items-start">
              <div class="flex-1">
                <div class="flex items-center gap-2">
                  <h3 class="font-bold text-lg text-white">${event.name}</h3>
                  <span class="bg-white/10 text-gray-200 text-xs font-semibold px-2 py-1 rounded-full border border-white/20">TERMINÉE</span>
                </div>
                <p class="text-sm text-gray-400">${dateStr} • Durée: ${formatDuration(duration)}</p>
                <div class="flex gap-4 mt-2 text-sm">
                  <span class="text-green-300">✓ ${event.played_songs || 0} jouées</span>
                  <span class="text-red-300">✗ ${event.rejected_songs || 0} refusées</span>
                  <span class="text-gray-300">📊 ${event.total_songs || 0} demandes</span>
                </div>
              </div>
              <button class="bg-violet-600 hover:bg-violet-500 text-white text-sm font-semibold py-2 px-4 rounded-xl transition">
                📊 Voir les stats
              </button>
            </div>
          </div>
        `;
          })
          .join("");
      }

      function viewEventDetails(eventId) {
        window.location.href = `/event/${eventId}/stats`;
      }

      loadHistory();
    </script>
  </body>
</html>
