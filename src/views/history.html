<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historique — DJ Queue</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css" />
  <script src="/js/theme.js"></script>
</head>
<body style="background:var(--bg-base);color:var(--text-primary)">

<div class="flex h-screen overflow-hidden">

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="hidden lg:flex flex-col w-56 shrink-0" style="background:var(--bg-surface);border-right:1px solid var(--border)">
    <div class="flex items-center gap-3 px-5 py-[18px]" style="border-bottom:1px solid var(--border)">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style="background:var(--accent)">
        <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
          <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
          <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
        </svg>
      </div>
      <span class="font-semibold text-sm">DJ Queue</span>
    </div>
    <div class="px-5 py-4" style="border-bottom:1px solid var(--border)">
      <p class="text-xs font-medium uppercase tracking-widest mb-1" style="color:var(--text-muted)">Connecté</p>
      <p id="sidebarDjName" class="text-sm font-semibold truncate" style="color:var(--text-primary)">—</p>
    </div>
    <nav class="flex-1 p-3 space-y-0.5">
      <a href="/dashboard" class="nav-item">
        <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/history" class="nav-item active">
        <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Historique
      </a>
    </nav>
    <div class="p-3" style="border-top:1px solid var(--border)">
      <button id="btnLogout" class="nav-item danger w-full">
        <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Déconnexion
      </button>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────── -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <header class="flex items-center gap-4 px-6 py-4 shrink-0" style="background:var(--bg-surface);border-bottom:1px solid var(--border)">
      <a href="/dashboard" class="btn btn-ghost btn-icon btn-sm">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <div class="flex-1">
        <h1 class="text-lg font-semibold" style="color:var(--text-primary)">Historique</h1>
        <p id="djName" class="text-xs mt-0.5" style="color:var(--text-secondary)">Chargement...</p>
      </div>
      <button data-theme-toggle class="btn btn-ghost btn-icon btn-sm" title="Passer en mode clair">
        <svg class="w-4 h-4 icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="w-4 h-4 icon-moon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </header>

    <main class="flex-1 overflow-y-auto p-5 lg:p-6 space-y-5 lg:space-y-6">

      <!-- Stats -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div class="card stat-card">
          <p class="stat-label">Soirées terminées</p>
          <p id="totalEndedEvents" class="stat-value mt-2" style="color:var(--accent)">—</p>
        </div>
        <div class="card stat-card">
          <p class="stat-label">Durée totale</p>
          <p id="totalDuration" class="stat-value mt-2" style="color:var(--cyan)">—</p>
        </div>
        <div class="card stat-card">
          <p class="stat-label">Chansons totales</p>
          <p id="totalSongsPlayed" class="stat-value mt-2" style="color:var(--green)">—</p>
        </div>
      </div>

      <!-- Ended events -->
      <div class="card overflow-hidden">
        <div class="flex items-center gap-2.5 px-5 py-4" style="border-bottom:1px solid var(--border)">
          <svg class="w-4 h-4 shrink-0" style="color:var(--text-muted)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <h2 class="text-sm font-semibold" style="color:var(--text-primary)">Soirées passées</h2>
        </div>
        <div id="endedEventsList" class="divide-y" style="border-color:var(--border)">
          <div class="px-5 py-10 text-center text-sm" style="color:var(--text-muted)">Chargement...</div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="/js/csrf.js"></script>
<script src="/js/time-utils.js"></script>
<script>
  document.getElementById("btnLogout").addEventListener("click", async () => {
    try { await fetch("/api/auth/logout", { method: "POST" }); } catch {}
    window.location.href = "/login";
  });

  async function loadHistory() {
    try {
      const response = await fetch("/api/dj/history");
      if (response.status === 401) { window.location.href = "/login"; return; }
      if (!response.ok) throw new Error("Erreur chargement historique");
      const data = await response.json();

      document.getElementById("djName").textContent = data.dj.name;
      document.getElementById("sidebarDjName").textContent = data.dj.name;

      document.getElementById("totalEndedEvents").textContent = data.stats.totalEnded || 0;
      document.getElementById("totalDuration").textContent    = window.TimeUtils.formatMinutes(data.stats.totalDurationMinutes || 0);
      document.getElementById("totalSongsPlayed").textContent = data.stats.totalSongsPlayed || 0;

      renderEndedEvents(data.events || []);
    } catch (error) {
      console.error("Erreur:", error);
    }
  }

  function renderEndedEvents(events) {
    const container = document.getElementById("endedEventsList");
    if (!events || events.length === 0) {
      container.innerHTML = `<div class="px-5 py-10 text-center text-sm" style="color:var(--text-muted)">Aucune soirée terminée</div>`;
      return;
    }
    container.innerHTML = events.map((event) => {
      const startDate = new Date(event.created_at);
      const endDate   = new Date(event.ended_at);
      const dateStr   = startDate.toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" });
      const duration  = Math.floor((endDate - startDate) / (1000 * 60));
      return `
      <div class="px-5 py-4 flex flex-col sm:flex-row sm:items-center gap-4 hover:bg-[var(--bg-elevated)] transition cursor-pointer" onclick="viewEventDetails('${event.id}')">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <h3 class="font-semibold text-sm truncate" style="color:var(--text-primary)">${event.name}</h3>
            <span class="badge badge-neutral shrink-0">Terminée</span>
          </div>
          <p class="text-xs mb-2" style="color:var(--text-muted)">${dateStr} — ${window.TimeUtils.formatMinutes(duration)}</p>
          <div class="flex flex-wrap gap-3 text-xs">
            <span style="color:var(--green)">${event.played_songs || 0} jouées</span>
            <span style="color:var(--red)">${event.rejected_songs || 0} refusées</span>
            <span style="color:var(--text-muted)">${event.total_songs || 0} demandes</span>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm shrink-0" onclick="event.stopPropagation();viewEventDetails('${event.id}')">
          Voir les stats
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>`;
    }).join("");
  }

  function viewEventDetails(eventId) { window.location.href = `/event/${eventId}/stats`; }
  loadHistory();
</script>
</body>
</html>
