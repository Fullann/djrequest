<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Erreur — DJ Queue</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css" />
  <script src="/js/theme.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background:var(--bg-base)">

  <div class="w-full max-w-md text-center">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <div class="w-8 h-8 rounded-xl flex items-center justify-center" style="background:var(--accent)">
        <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <span class="font-bold text-lg" style="color:var(--text-primary)">DJ Queue</span>
    </div>

    <!-- Icône d'erreur -->
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl mb-6" id="errorIcon" style="background:var(--bg-elevated);border:1px solid var(--border)">
      <!-- rempli par JS -->
    </div>

    <!-- Code -->
    <p class="text-xs font-bold tracking-widest uppercase mb-2" style="color:var(--text-muted)" id="errorCode">404</p>

    <!-- Titre -->
    <h1 class="text-2xl font-bold mb-3" style="color:var(--text-primary)" id="errorTitle">Page introuvable</h1>

    <!-- Message -->
    <p class="text-sm leading-relaxed mb-8" style="color:var(--text-secondary)" id="errorMessage">
      Cette page n'existe pas ou a été supprimée.
    </p>

    <!-- Actions -->
    <div class="flex flex-col gap-3" id="errorActions">
      <!-- rempli par JS -->
    </div>

    <!-- Footer discret -->
    <p class="text-xs mt-10" style="color:var(--text-muted)">
      Si le problème persiste, contacte l'organisateur.
    </p>

  </div>

<script>
  // Lire les paramètres depuis l'URL : ?code=404&title=...&message=...&back=...&backLabel=...
  const params  = new URLSearchParams(window.location.search);
  const code    = params.get("code")    || "404";
  const title   = params.get("title")   || "Page introuvable";
  const message = params.get("message") || "Cette page n'existe pas ou a été supprimée.";
  const back    = params.get("back");
  const backLabel = params.get("backLabel") || "Retour à l'accueil";

  document.getElementById("pageTitle").textContent   = `${title} — DJ Queue`;
  document.getElementById("errorCode").textContent   = code;
  document.getElementById("errorTitle").textContent  = title;
  document.getElementById("errorMessage").textContent = message;

  // Icône selon le type d'erreur
  const icons = {
    "404": `<svg class="w-10 h-10" style="color:var(--text-muted)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>`,
    "403": `<svg class="w-10 h-10" style="color:var(--amber)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>`,
    "ended": `<svg class="w-10 h-10" style="color:var(--accent)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
              </svg>`,
    "500": `<svg class="w-10 h-10" style="color:var(--red)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>`,
  };
  document.getElementById("errorIcon").innerHTML = icons[code] || icons["404"];

  // Boutons d'action
  const actions = document.getElementById("errorActions");
  if (back) {
    actions.innerHTML = `
      <a href="${back}" class="btn btn-primary btn-full">${backLabel}</a>
      <a href="/" class="btn btn-ghost btn-full">Retour à l'accueil</a>`;
  } else {
    actions.innerHTML = `<a href="/" class="btn btn-primary btn-full">Retour à l'accueil</a>`;
  }
</script>
</body>
</html>
