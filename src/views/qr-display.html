<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecran live — DJ Queue</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css" />
  <script src="/js/theme.js"></script>
</head>
<body class="min-h-screen" style="background:var(--bg-base);color:var(--text-primary)">

<div class="max-w-[1600px] mx-auto p-4 lg:p-6">

  <!-- Header -->
  <div class="flex items-center justify-between mb-5">
    <div>
      <h1 id="eventName" class="text-2xl lg:text-3xl font-bold" style="color:var(--text-primary)">Chargement...</h1>
      <p class="text-sm mt-0.5" style="color:var(--text-secondary)">Ecran live de la soirée</p>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full dot-pulse" style="background:var(--green)"></span>
        <span class="text-xs font-semibold uppercase tracking-wider" style="color:var(--green)">Live</span>
      </div>
      <button data-theme-toggle class="btn btn-ghost btn-icon btn-sm" title="Passer en mode clair">
        <svg class="w-4 h-4 icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="w-4 h-4 icon-moon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-12 gap-5 lg:gap-6">

    <!-- ── Left sidebar ──────────────────────────────────── -->
    <aside class="xl:col-span-4 space-y-4">

      <!-- QR + Now playing -->
      <div class="card p-5 text-center">
        <p class="text-sm font-medium mb-4" style="color:var(--text-secondary)">Scanner pour proposer une chanson</p>
        <div class="inline-block p-3 rounded-xl mb-5" style="background:#fff">
          <img id="qrCode" src="" alt="QR Code" class="w-56 h-56 lg:w-64 lg:h-64 block" />
        </div>

        <!-- Now playing -->
        <div class="rounded-xl p-4 text-left" style="background:var(--bg-elevated);border:1px solid var(--border)">
          <p class="text-xs font-semibold uppercase tracking-wider mb-3" style="color:var(--text-muted)">En cours de lecture</p>
          <div class="flex items-center gap-3">
            <div id="nowPlayingImageWrapper" class="hidden shrink-0">
              <img id="nowPlayingImage" src="" alt="Pochette" class="w-14 h-14 rounded-lg object-cover" />
            </div>
            <div class="min-w-0 flex-1">
              <p id="nowPlayingTitle" class="text-sm font-semibold truncate" style="color:var(--text-primary)">Aucune musique</p>
              <p id="nowPlayingArtist" class="text-xs truncate mt-0.5" style="color:var(--text-secondary)">—</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Live stats -->
      <div class="card p-5">
        <p class="text-xs font-semibold uppercase tracking-wider mb-4" style="color:var(--text-muted)">Stats en direct</p>
        <div class="grid grid-cols-3 gap-3 text-center">
          <div>
            <p id="pendingCount" class="text-2xl font-bold" style="color:var(--amber)">0</p>
            <p class="text-xs mt-1" style="color:var(--text-muted)">En attente</p>
          </div>
          <div>
            <p id="queueCount" class="text-2xl font-bold" style="color:var(--accent)">0</p>
            <p class="text-xs mt-1" style="color:var(--text-muted)">Queue</p>
          </div>
          <div>
            <p id="playedCount" class="text-2xl font-bold" style="color:var(--green)">0</p>
            <p class="text-xs mt-1" style="color:var(--text-muted)">Jouées</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- ── Main content ──────────────────────────────────── -->
    <section class="xl:col-span-8 space-y-4">

      <!-- Upcoming queue -->
      <div class="card overflow-hidden">
        <div class="flex items-center justify-between px-5 py-4" style="border-bottom:1px solid var(--border)">
          <h2 class="text-sm font-semibold" style="color:var(--text-primary)">Prochaines musiques</h2>
          <span id="upcomingCount" class="text-xs" style="color:var(--text-muted)">0</span>
        </div>
        <div id="upcomingList" class="divide-y" style="border-color:var(--border)">
          <div class="px-5 py-10 text-center text-sm" style="color:var(--text-muted)">Chargement...</div>
        </div>
      </div>

      <!-- Recently played -->
      <div class="card overflow-hidden">
        <div class="flex items-center justify-between px-5 py-4" style="border-bottom:1px solid var(--border)">
          <h2 class="text-sm font-semibold" style="color:var(--text-primary)">Dernières jouées</h2>
          <span id="playedListCount" class="text-xs" style="color:var(--text-muted)">0</span>
        </div>
        <div id="playedList" class="divide-y" style="border-color:var(--border)">
          <div class="px-5 py-10 text-center text-sm" style="color:var(--text-muted)">Chargement...</div>
        </div>
      </div>

    </section>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/csrf.js"></script>
<script>
  const eventId = window.location.pathname.split("/")[2];
  const socket  = io();

  function formatClock(dateString) {
    if (!dateString) return "--:--";
    return new Date(dateString).toLocaleTimeString("fr-FR", { hour:"2-digit", minute:"2-digit" });
  }

  function renderUpcoming(queue = []) {
    const container = document.getElementById("upcomingList");
    document.getElementById("upcomingCount").textContent = queue.length;
    if (!queue.length) {
      container.innerHTML = `<div class="px-5 py-10 text-center text-sm" style="color:var(--text-muted)">Aucune musique en queue</div>`;
      return;
    }
    container.innerHTML = queue.slice(0, 12).map((song, index) => `
      <div class="px-5 py-3.5 flex items-center gap-3">
        <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shrink-0" style="background:var(--accent-dim);color:var(--accent)">${index+1}</div>
        ${song.image_url
          ? `<img src="${song.image_url}" alt="" class="w-11 h-11 rounded-lg object-cover shrink-0">`
          : `<div class="w-11 h-11 rounded-lg shrink-0" style="background:var(--bg-overlay)"></div>`}
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium truncate" style="color:var(--text-primary)">${song.song_name}</p>
          <p class="text-xs truncate" style="color:var(--text-secondary)">${song.artist}</p>
          <p class="text-xs mt-0.5" style="color:var(--text-muted)">Proposé par ${song.user_name || "Anonyme"}</p>
        </div>
      </div>`).join("");
  }

  function renderPlayed(played = []) {
    const container = document.getElementById("playedList");
    document.getElementById("playedListCount").textContent = played.length;
    if (!played.length) {
      container.innerHTML = `<div class="px-5 py-10 text-center text-sm" style="color:var(--text-muted)">Aucune musique jouée</div>`;
      return;
    }
    container.innerHTML = played.slice(0, 12).map((song) => `
      <div class="px-5 py-3.5 flex items-center gap-3" style="opacity:0.7">
        ${song.image_url
          ? `<img src="${song.image_url}" alt="" class="w-11 h-11 rounded-lg object-cover shrink-0">`
          : `<div class="w-11 h-11 rounded-lg shrink-0" style="background:var(--bg-overlay)"></div>`}
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium truncate" style="color:var(--text-primary)">${song.song_name}</p>
          <p class="text-xs truncate" style="color:var(--text-secondary)">${song.artist}</p>
        </div>
        <span class="text-xs shrink-0 font-mono" style="color:var(--text-muted)">${formatClock(song.played_at)}</span>
      </div>`).join("");
  }

  async function loadDisplayData() {
    try {
      const [eventResponse, qrResponse, statsResponse, displayResponse] = await Promise.all([
        fetch(`/api/events/${eventId}`),
        fetch(`/api/events/${eventId}/qrcode`),
        fetch(`/api/events/${eventId}/stats`),
        fetch(`/api/events/${eventId}/display-data`),
      ]);
      const eventData   = await eventResponse.json();
      const qrData      = await qrResponse.json();
      const statsData   = await statsResponse.json();
      const displayData = await displayResponse.json();

      document.getElementById("eventName").textContent  = displayData.event?.name || eventData.name || "Soirée";
      document.getElementById("qrCode").src             = qrData.qrCode;
      document.getElementById("pendingCount").textContent = statsData.stats?.pending_count || 0;
      document.getElementById("queueCount").textContent   = statsData.stats?.accepted_count || 0;
      document.getElementById("playedCount").textContent  = statsData.stats?.played_count || 0;

      renderUpcoming(displayData.upcomingQueue || []);
      renderPlayed(displayData.recentPlayed || []);
      updateNowPlaying(displayData);
    } catch (error) {
      console.error("Erreur chargement affichage live:", error);
    }
  }

  function updateNowPlaying(displayData) {
    const nowPlaying = displayData?.recentPlayed?.[0] || null;
    const imageWrapper = document.getElementById("nowPlayingImageWrapper");
    const imageEl      = document.getElementById("nowPlayingImage");
    const titleEl      = document.getElementById("nowPlayingTitle");
    const artistEl     = document.getElementById("nowPlayingArtist");

    if (!nowPlaying) {
      imageWrapper.classList.add("hidden");
      titleEl.textContent  = "Aucune musique";
      artistEl.textContent = "—";
      return;
    }
    if (nowPlaying.image_url) {
      imageEl.src = nowPlaying.image_url;
      imageWrapper.classList.remove("hidden");
    } else {
      imageWrapper.classList.add("hidden");
    }
    titleEl.textContent  = nowPlaying.song_name || "Titre inconnu";
    artistEl.textContent = nowPlaying.artist    || "Artiste inconnu";
  }

  socket.on("connect", () => {
    socket.emit("join-event", eventId);
  });
  if (socket.connected) {
    socket.emit("join-event", eventId);
  }

  socket.on("new-request",      loadDisplayData);
  socket.on("request-accepted", loadDisplayData);
  socket.on("request-rejected", loadDisplayData);
  socket.on("queue-updated",    loadDisplayData);
  socket.on("vote-updated",     loadDisplayData);
  socket.on("event-ended",      loadDisplayData);

  loadDisplayData();
  setInterval(loadDisplayData, 15000);
</script>
</body>
</html>
