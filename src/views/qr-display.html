<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DJ Queue - QR Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap");
      * {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-[#0d0d0d] text-white min-h-screen flex items-center justify-center p-4"
  >
    <div class="max-w-2xl w-full">
      <!-- Carte QR Code -->
      <div class="bg-white/5 border border-white/10 rounded-2xl shadow-2xl p-8 text-center">
        <h1 id="eventName" class="text-3xl font-extrabold text-white mb-2">
          Soirée
        </h1>
        <p class="text-gray-400 mb-8">Scanne le QR code pour rejoindre !</p>

        <!-- QR Code -->
        <div class="flex justify-center mb-8">
          <img
            id="qrCode"
            src=""
            alt="QR Code"
            class="w-80 h-80 border-4 border-violet-400/40 rounded-xl bg-white p-2"
          />
        </div>

        <!-- URL -->
        <div class="bg-white/5 border border-white/10 rounded-xl p-4 mb-6">
          <p class="text-sm text-gray-400 mb-2">Ou partage ce lien :</p>
          <div class="flex items-center gap-2">
            <input
              id="eventUrl"
              type="text"
              readonly
              class="flex-1 px-4 py-2 bg-black/30 border border-white/20 rounded-xl text-sm text-white"
            />
            <button
              id="btnCopyUrl"
              class="bg-violet-600 hover:bg-violet-500 text-white font-semibold py-2 px-6 rounded-xl transition"
            >
              📋 Copier
            </button>
          </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-3 justify-center">
          <button
            id="btnPrint"
            class="bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-3 px-6 rounded-xl transition"
          >
            🖨️ Imprimer
          </button>
          <button
            id="btnGoToDJ"
            class="bg-violet-600 hover:bg-violet-500 text-white font-semibold py-3 px-6 rounded-xl transition"
          >
            🎧 Interface DJ
          </button>
          <button
            id="btnBackToDashboard"
            class="border border-white/20 bg-white/5 hover:bg-white/10 text-gray-100 font-semibold py-3 px-6 rounded-xl transition"
          >
            ← Dashboard
          </button>
        </div>
      </div>

      <!-- Stats en temps réel -->
      <div class="mt-6 bg-white/5 border border-white/10 rounded-2xl shadow p-6">
        <h2 class="text-xl font-bold text-white mb-4">
          📊 Stats en temps réel
        </h2>
        <div class="grid grid-cols-3 gap-4 text-center">
          <div>
            <p class="text-3xl font-extrabold text-violet-400" id="pendingCount">
              0
            </p>
            <p class="text-sm text-gray-400">En attente</p>
          </div>
          <div>
            <p class="text-3xl font-extrabold text-green-400" id="queueCount">0</p>
            <p class="text-sm text-gray-400">Dans la queue</p>
          </div>
          <div>
            <p class="text-3xl font-extrabold text-cyan-400" id="playedCount">0</p>
            <p class="text-sm text-gray-400">Jouées</p>
          </div>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/csrf.js"></script>
    <script>
      const eventId = window.location.pathname.split("/")[2];
      const socket = io();

      // ========== Event Listeners ==========

      document.getElementById("btnCopyUrl").addEventListener("click", copyUrl);
      document.getElementById("btnPrint").addEventListener("click", printQR);
      document.getElementById("btnGoToDJ").addEventListener("click", goToDJ);
      document
        .getElementById("btnBackToDashboard")
        .addEventListener("click", backToDashboard);

      // ========== Fonctions ==========

      // Charger les données
      fetch(`/api/events/${eventId}`)
        .then((r) => r.json())
        .then((data) => {
          document.getElementById("eventName").textContent = data.name;
          document.getElementById("eventUrl").value =
            window.location.origin + "/user/" + eventId;

          // Générer QR code
          fetch(`/api/events/${eventId}/qrcode`)
            .then((r) => r.json())
            .then((qr) => {
              document.getElementById("qrCode").src = qr.qrCode;
            });

          updateStats();
        })
        .catch((error) => {
          console.error("Erreur chargement événement:", error);
          alert("Erreur lors du chargement de l'événement");
        });

      // WebSocket pour stats temps réel
      socket.emit("join-event", eventId);

      socket.on("new-request", () => updateStats());
      socket.on("request-accepted", () => updateStats());
      socket.on("queue-updated", () => updateStats());

      async function updateStats() {
        try {
          const response = await fetch(`/api/events/${eventId}/stats`);
          const data = await response.json();

          document.getElementById("pendingCount").textContent =
            data.stats.pending_count || 0;
          document.getElementById("queueCount").textContent =
            data.stats.accepted_count || 0;
          document.getElementById("playedCount").textContent =
            data.stats.played_count || 0;
        } catch (error) {
          console.error("Erreur mise à jour stats:", error);
        }
      }

      function copyUrl() {
        const url = document.getElementById("eventUrl");
        url.select();
        url.setSelectionRange(0, 99999); // Pour mobile

        // Méthode moderne
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard
            .writeText(url.value)
            .then(() => {
              showCopySuccess();
            })
            .catch(() => {
              // Fallback
              document.execCommand("copy");
              showCopySuccess();
            });
        } else {
          // Fallback pour anciens navigateurs
          document.execCommand("copy");
          showCopySuccess();
        }
      }

      function showCopySuccess() {
        const btn = document.getElementById("btnCopyUrl");
        const originalText = btn.innerHTML;
        btn.innerHTML = "✅ Copié !";
        btn.classList.add("bg-green-600");
        btn.classList.remove("bg-violet-600");

        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove("bg-green-600");
          btn.classList.add("bg-violet-600");
        }, 2000);
      }

      function printQR() {
        window.print();
      }

      function goToDJ() {
        window.location.href = `/dj/${eventId}`;
      }

      function backToDashboard() {
        window.location.href = "/dashboard";
      }
    </script>

    <style>
      @media print {
        body {
          background: white;
          color: black;
        }
        button {
          display: none;
        }
        .mt-6 {
          display: none;
        }
        #eventName,
        p {
          color: black !important;
        }
      }
    </style>
  </body>
</html>
